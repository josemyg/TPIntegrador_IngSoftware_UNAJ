{% load static %}
<!doctype html>
<html lang="es" data-bs-theme="light">
<head>
  <title>{% block title %} {% endblock %}</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link href="{% static 'gestion/css/bootstrap.min.css'%}" rel="stylesheet">
  <link href="{% static 'gestion/icons/favicon152x152.png' %}" rel="icon" >
  <script src="{% static 'gestion/third/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <link href="{% static 'gestion/css/style.css'%}" rel="stylesheet">
  <link rel="stylesheet" 
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" /> <!-- Agrega el CSS de Select2 -->
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-primary bg-light" data-bs-theme="light">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Gol Ahora</a>
      <div class="collapse navbar-collapse" id="barranavegacion">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="/">Home</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Profesores
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{% url 'profesor_create' %}">Registrar Profesor/a</a></li>
              <li><a class="dropdown-item" href="{% url 'profesor_list' %}">Listar Profesores</a></li>
            </ul>
          </li>
        </ul>
      </div>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#barranavegacion" aria-controls="barranavegacion" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="container mt-3">

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-{{ message.tags }} alert-dismissible fade show">

                {{ message }}

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}

    {% endif %}

</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- Agrega jQuery, necesario para Select2 -->

  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script> <!-- Agrega el JS de Select2 -->

  {% block content %} {% endblock %}

</body>

</html>
