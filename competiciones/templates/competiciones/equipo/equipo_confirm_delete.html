{% extends 'base.html' %}

{% block title %}Eliminar Equipo{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger shadow w-50 mx-auto text-center">
        <h4 class="alert-heading">¿Confirmas la eliminacion?</h4>
        <p>Estas a punto de eliminar el equipo <strong>{{ object.nombre }}</strong>.</p>
        <hr>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Si, eliminar</button>
            <a href="{% url 'equipo_list' %}" class="btn btn-secondary px-4">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
