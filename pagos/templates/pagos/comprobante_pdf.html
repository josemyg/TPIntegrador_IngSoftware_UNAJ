<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 2cm; }
        body { font-family: Helvetica, Arial, sans-serif; color: #333; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #198754; padding-bottom: 10px; }
        .invoice-box { max-width: 800px; margin: auto; }
        table { width: 100%; line-height: inherit; text-align: left; border-collapse: collapse; }
        table td { padding: 8px; vertical-align: top; }
        .fw-bold { font-weight: bold; }
        .total-box { background-color: #f8f9fa; font-size: 1.2rem; padding: 15px; text-align: right; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="invoice-box">
        <div class="header">
            <h2>GOL AHORA COMPROBANTE</h2>
        </div>
        
        <table>
            <tr>
                <td class="fw-bold">Nro. Comprobante:</td>
                <td>#{{ recibo.id }}</td>
            </tr>
            <tr>
                <td class="fw-bold">Fecha de Emisión:</td>
                <td>{{ recibo.fecha|date:"d/m/Y H:i" }}</td>
            </tr>
            <tr>
                <td class="fw-bold">Concepto:</td>
                <td>{{ pago.get_origen_pago_display }}</td>
            </tr>
            <tr>
                <td class="fw-bold">Método de Pago:</td>
                <td>{{ pago.tipo_pago.nombre }}</td>
            </tr>
        </table>

        <div class="total-box">
            <span class="fw-bold">MONTO NETO COBRADO: ${{ pago.monto }}</span>
        </div>
    </div>
</body>
</html>
