{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            
            <div class="card border-0 shadow rounded-3 overflow-hidden bg-white text-center p-4">
                
                <div class="mb-3">
                    <span class="badge bg-success-subtle text-success border border-success-subtle px-3 py-1.5 rounded-pill fw-semibold small">
                        <i class="bi bi-shield-check me-1"></i> Transacción Segura
                    </span>
                </div>

                <h4 class="fw-bold text-dark mb-1">GOL AHORA</h4>
                
                <hr class="my-3 opacity-25">

                <div class="bg-light p-3 rounded-3 text-start mb-4">
                    <div class="d-flex justify-content-between mb-1">
                        <span class="text-muted small">Concepto:</span>
                        <span class="fw-semibold text-dark small">{{ pago.get_origen_pago_display }}</span>
                    </div>
                    <div class="d-flex justify-content-between mb-1">
                        <span class="text-muted small">ID Operación:</span>
                        <span class="text-secondary small">#{{ pago.id }}</span>
                    </div>
                    <div class="d-flex justify-content-between border-top pt-2 mt-2">
                        <span class="fw-bold text-dark">Monto Total:</span>
                        <span class="fw-extrabold text-danger fs-5">${{ pago.monto }}</span>
                    </div>
                </div>

                <div class="d-inline-block p-3 bg-white border rounded-3 shadow-sm mx-auto mb-4" style="max-width: 240px;">
                    <img src="{{ qr_code }}" class="img-fluid" alt="Código QR de Pago en Línea" style="width: 200px; height: 200px;">
                </div>

                <div class="d-grid gap-2">
                    <a href="{% url 'pago_list' %}" class="btn btn-dark py-2.5 fw-bold rounded-3">
                        Volver al Historial de Pagos
                    </a>
                </div>

            </div>

        </div>
    </div>
</div>
{% endblock %}
