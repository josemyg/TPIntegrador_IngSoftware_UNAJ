{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'pagos/css/style.css' %}">
</head>
<body class="py-5">
<div class="row justify-content-center m-0" style="margin-top: 10% !important;">
    <div class="col-12 col-sm-8 col-md-5 text-center">
        <div class="form-card text-center p-5">
            <div class="text-danger mb-3"><i class="bi bi-exclamation-triangle fs-1"></i></div>
            <h3 class="fw-bold text-dark mb-2">¿Confirmás la eliminación?</h3>
            <p class="text-muted small mb-4">Esta acción borrará el registro de forma permanente de la base de datos y afectará las auditorías de caja.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <a href="{% url 'pago_list' %}" class="btn btn-light w-100 py-2">No, Cancelar</a>
                    <button type="submit" class="btn btn-danger w-100 py-2">Sí, Eliminar Permanentemente</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
