{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 text-center bg-white p-4 p-md-5 rounded-4 shadow-sm mt-5">
        
        <div class="d-inline-flex align-items-center justify-content-center bg-danger-subtle text-danger rounded-circle mb-3" style="width: 70px; height: 70px;">
        </div>

        <h2 class="text-dark fw-bold mb-2">¿Eliminar Cancha?</h2>
        <p class="text-muted small mb-4">
            Estás a punto de borrar la cancha <strong class="text-dark">"{{ object.nombre }}"</strong> de forma permanente. 
            Esta acción no se puede deshacer.
        </p>

        <form method="post" class="mt-4">
            {% csrf_token %}
            
            <div class="row g-2">
                <div class="col-6">
                    <a href="{% url 'cancha_list' %}" class="btn btn-light btn-lg w-100 fs-6 text-muted fw-semibold py-2.5">
                        Cancelar
                    </a>
                </div>
                <div class="col-6">
                    <button type="submit" class="btn btn-danger btn-lg w-100 fs-6 fw-semibold shadow-sm py-2.5">
                        Eliminar
                    </button>
                </div>
            </div>
        </form>

    </div>
{% endblock %}
