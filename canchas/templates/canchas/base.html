{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Canchas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { 
            background-image: url("{% static 'canchas/icons/fondo.jpg' %}");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .navbar-custom { 
            background: linear-gradient(135deg, #000000 0%, #0f2c0af6 100%); 
        }
        h2, .fw-extrabold {
        color: #000000 !important;
        text-shadow: 1px 1px 2px rgba(238, 238, 238, 0.71); /* Sutil sombra blanca atrás para que despegue del fondo verde */
        }
        .text-muted {
        color: #000000 !important;
        font-weight: 500; /* Le da un poquito más de cuerpo a la letra */
         }
         .bg-dark::placeholder {
        color: rgba(255, 255, 255, 0.6) !important; /* Blanco semitransparente */
        }

    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'tipo_cancha_list' %}">
                <img src="{% static 'canchas/icons/cancha.png' %}" alt="Logo" width="60" height="60" class="d-inline-block align-top rounded-circle">
                <span>Complejo Deportivo "GOL AHORA" <span class="text-warning">|</span> Gestión</span>
            </a>
        </div>
    </nav>

    <div class="container mb-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
