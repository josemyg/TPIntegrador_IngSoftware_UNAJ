{% extends 'base.html' %}
{% load static %}

{% block title %}
Lista de descuentos
{% endblock title %}

{% block content %}

<div class="container my-5">

    <div class="container">

        <h1 class="fw-bold text-dark mb-0">Lista de tipos de descuentos</h1>

        <table class="table table-striped">

            <thead>

                <tr class="table-primary">

                    <th scope="col">Nombre</th>
                    <th scope="col"></th>

                </tr>

            </thead>

            <tbody>

                {% for tipodescuento in tipodescuento_list %}

                <tr>

                    <td>{{ tipodescuento.nombreDescuento }}</td>

                    <td>
                        <a href="{% url 'tipodescuento_update' tipodescuento.id %}"><img src="{% static 'gestion/third/bootstrap-icons/pencil-square.svg' %}" alt="Editar" width="24" height="24" /></a>
                        <a href="{% url 'tipodescuento_delete' tipodescuento.id %}"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#970707" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash2-icon lucide-trash-2"><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></a>
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    {% endblock %}
